name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Cross-compile localproxy
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: macos-intel
          - goos: darwin
            goarch: arm64
            suffix: macos-apple-silicon
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
          - goos: freebsd
            goarch: amd64
            suffix: freebsd-amd64
          - goos: freebsd
            goarch: arm64
            suffix: freebsd-arm64
          - goos: openbsd
            goarch: amd64
            suffix: openbsd-amd64
          - goos: netbsd
            goarch: amd64
            suffix: netbsd-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -trimpath \
            -o localproxy-${{ matrix.suffix }}${{ matrix.ext }} \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: localproxy-${{ matrix.suffix }}
          path: localproxy-${{ matrix.suffix }}${{ matrix.ext }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
